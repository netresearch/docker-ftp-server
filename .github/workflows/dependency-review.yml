name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  # Dependency review via the org's shared reusable, so the pinned action
  # version is maintained centrally instead of bumped per-repo.
  dependency-review:
    uses: netresearch/.github/.github/workflows/dependency-review.yml@main
    permissions:
      contents: read
      pull-requests: write
    with:
      fail-on-severity: moderate
