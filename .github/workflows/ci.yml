name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions: {}

jobs:
  # Gold-standard container CI via the org meta-reusable: Dockerfile lint
  # (+ shellcheck), YAML/compose lint, validation-only image build with
  # Trivy, secret scanning and dependency review — one call site.
  # References @feat/docker-gold-standard until netresearch/.github#251
  # merges; flip to @main afterwards.
  docker-ci:
    uses: netresearch/.github/.github/workflows/docker-image-ci.yml@feat/docker-gold-standard
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
      actions: read
      pull-requests: write
    with:
      image-name: docker-ftp-server
      dockerfile: ./Dockerfile
      lint-container: true
      shell-scandirs: setup
      lint-yaml: true
      lint-markdown: false
      # lint-compose stays false until netresearch/.github#251 merges: the
      # meta pins its leaves @main, but lint-compose.yml is new in #251 and
      # not yet on main, so enabling it startup-fails the whole run. Re-enable
      # (with compose-files: docker-compose.yml) after flipping to @main.
      lint-compose: false
      enable-gitleaks: true
      enable-codeql: false
      enable-smoke-test: false
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Bespoke runtime test — boots the image and asserts vsftpd listens on
  # port 21. Not covered by the meta (its smoke-test uses
  # container-structure-test), so it stays here.
  test:
    name: Test FTP Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build Docker image
        run: docker build -t ghcr.io/netresearch/docker-ftp-server:test .

      - name: Start FTP server
        run: |
          docker run -d --name ftp-test \
            -e USERS=testuser:testpass123 \
            -p 21:21 \
            ghcr.io/netresearch/docker-ftp-server:test

      - name: Wait for FTP server to be ready
        run: |
          echo "Waiting for FTP server to start..."
          for i in {1..30}; do
            if docker ps | grep -q ftp-test; then
              sleep 2  # Give it a couple more seconds to fully initialize
              if docker exec ftp-test ps aux | grep -q vsftpd; then
                echo "FTP server is ready"
                exit 0
              fi
            fi
            echo "Waiting... attempt $i/30"
            sleep 1
          done
          echo "FTP server failed to start in time"
          docker logs ftp-test
          exit 1

      - name: Check if FTP server is running
        run: |
          docker ps --filter name=ftp-test
          docker logs ftp-test

      - name: Test FTP connection
        run: |
          # Test if port 21 is listening using bash built-in
          for i in {1..10}; do
            if timeout 2 bash -c 'cat < /dev/null > /dev/tcp/localhost/21' 2>/dev/null; then
              echo "FTP server is listening on port 21"
              exit 0
            fi
            echo "Attempt $i/10: FTP port not ready yet"
            sleep 1
          done
          echo "FTP port not available after 10 attempts"
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f ftp-test || true
