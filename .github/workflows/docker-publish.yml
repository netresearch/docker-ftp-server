name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push
    uses: netresearch/.github/.github/workflows/build-container-bake.yml@main
    # security-events: write is consumed by the Trivy SARIF upload (scan: true),
    # and is required in any case because the reusable workflow's job declares
    # it: a caller granting less cannot start the called workflow.
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      bake-file: docker-bake.hcl
      # Build from the LOCAL checkout. Mandatory whenever metadata-images is
      # used: docker/metadata-action writes its tag/label bake files to
      # $RUNNER_TEMP, which the default git-remote bake context cannot read.
      bake-source: "."
      targets: ftp-server
      # Platforms (linux/amd64, linux/arm64) are declared in docker-bake.hcl.
      push: true
      # Trivy-scan the image this workflow publishes; the reusable uploads the
      # findings to code scanning as SARIF.
      scan: true
      # In-image SPDX SBOM attestation attached to every pushed image.
      # Replaces the previous downloadable `sbom` workflow artifact; retrieval
      # is documented in README.rst ("Supply chain metadata").
      sbom: true
      # `attest` is left at its default (false), which makes the reusable pass an
      # EMPTY provenance value to docker/bake-action — not "off". With an empty
      # provenance input, a registry push and a public repository, bake-action
      # injects `--set <target>.attest=type=provenance,mode=max` itself, so every
      # pushed image still gets a max-mode SLSA provenance attestation. The
      # pre-migration docker/build-push-action step behaved identically, so this
      # is unchanged by the migration. Setting `attest: true` here would be a
      # no-op for the same reason.
      metadata-images: ghcr.io/${{ github.repository }}
      metadata-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=sha,prefix={{branch}}-
        type=raw,value=latest,enable={{is_default_branch}}
