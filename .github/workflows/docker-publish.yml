name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push
    uses: netresearch/.github/.github/workflows/build-container-bake.yml@main
    # security-events: write is required because the reusable workflow's job
    # declares it; a caller granting less cannot start the called workflow.
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    with:
      bake-file: docker-bake.hcl
      # Build from the LOCAL checkout. Mandatory whenever metadata-images is
      # used: docker/metadata-action writes its tag/label bake files to
      # $RUNNER_TEMP, which the default git-remote bake context cannot read.
      bake-source: "."
      targets: ftp-server
      # Platforms (linux/amd64, linux/arm64) are declared in docker-bake.hcl.
      push: true
      # No Trivy scan here: vulnerability scanning is owned by ci.yml. This
      # workflow never scanned, and enabling it would add a new code-scanning
      # stream on tag/release refs.
      scan: false
      # In-image SPDX SBOM attestation attached to every pushed image.
      sbom: true
      metadata-images: ghcr.io/${{ github.repository }}
      metadata-tags: |
        type=ref,event=branch
        type=ref,event=pr
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=sha,prefix={{branch}}-
        type=raw,value=latest,enable={{is_default_branch}}
